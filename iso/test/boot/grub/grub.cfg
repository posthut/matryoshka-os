# GRUB2 Configuration for MatryoshkaOS

set timeout=5
set default=0

menuentry "MatryoshkaOS" {
    multiboot2 /boot/test-kernel.elf
    boot
}

menuentry "MatryoshkaOS (Debug Mode)" {
    multiboot2 /boot/test-kernel.elf debug=1
    boot
}

menuentry "MatryoshkaOS (Test Mode)" {
    multiboot2 /boot/test-kernel.elf test=1
    boot
}

