# GRUB2 Configuration for MatryoshkaOS

# Force text mode for UEFI
set gfxpayload=text
terminal_input console
terminal_output console

set timeout=5
set default=0

menuentry "MatryoshkaOS" {
    multiboot2 /boot/matryoshka-kernel.elf
    boot
}

menuentry "MatryoshkaOS (Debug Mode)" {
    multiboot2 /boot/matryoshka-kernel.elf debug=1
    boot
}

menuentry "MatryoshkaOS (Test Mode)" {
    multiboot2 /boot/matryoshka-kernel.elf test=1
    boot
}

